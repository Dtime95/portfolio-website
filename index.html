<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        header {
            background: black;
            color: white;
            padding: 20px;
        }

        section {
            background: white;
            margin: 20px;
            padding: 20px;
        }

        img {
            cursor: pointer;
            margin: 10px;
        }

        /* LIGHTBOX */
        #box {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
        }

        #box img {
            margin-top: 100px;
            width: 400px;
        }
    </style>
</head>

<body>

<header>
    <h1>Your Name</h1>
    <p>My Portfolio Website</p>
</header>

<section>
    <h2>About Me</h2>
    <p>I am learning web development.</p>
</section>

<section>
    <h2>Projects</h2>
    <p>This is my first project.</p>
</section>

<section>
    <h2>Gallery</h2>

    <img src="https://via.placeholder.com/200" onclick="openPic()">

</section>

<!-- POPUP -->
<div id="box" onclick="closePic()">
    <img src="https://via.placeholder.com/600">
</div>

<script>
function openPic() {
    document.getElementById("box").style.display = "block";
}

function closePic() {
    document.getElementById("box").style.display = "none";
}
</script>

</body>
</html>
